services:
  postgres:
    image: postgres:16-alpine
    container_name: foodeapp-postgres-users
    command:
      - postgres
      - -c
      - log_statement=all
      - -c
      - log_duration=on
      - -c
      - log_min_duration_statement=0
      - -c
      - log_line_prefix=%t [%p] %u@%d 
    environment:
      POSTGRES_DB: ${POSTGRES_DB_users}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB_users}"]
      interval: 5s
      timeout: 5s
      retries: 20
    volumes:
      - foodeapp_postgres_users_data:/var/lib/postgresql/data
    ports:
      - "${POSTGRES_PORT:-5432}:5432"

  # ── ZITADEL (ADR-026 — IAM) ───────────────────────────────────────────────
  # Fornece OIDC/OAuth2 para FoodeApp (registro email+senha, verificação de
  # email, reset de senha, sessões, promoção de role). Modo dev-only: insecure
  # (HTTP), masterkey fixa do .env, banco dedicado no mesmo Postgres via
  # init container que cria a database 'zitadel'.
  zitadel-init-db:
    image: postgres:16-alpine
    container_name: foodeapp-zitadel-init-db
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      PGHOST: postgres
      PGPORT: 5432
      PGUSER: ${POSTGRES_USER}
      PGPASSWORD: ${POSTGRES_PASSWORD}
    entrypoint:
      - sh
      - -c
      - |
        psql -d postgres -tc "SELECT 1 FROM pg_database WHERE datname='zitadel'" | grep -q 1 || \
          psql -d postgres -c "CREATE DATABASE zitadel"
    restart: "no"

  zitadel:
    image: ghcr.io/zitadel/zitadel:v2.71.1
    container_name: foodeapp-zitadel
    restart: unless-stopped
    command: >
      start-from-init
      --masterkey ${ZITADEL_MASTERKEY}
      --tlsMode disabled
    environment:
      ZITADEL_EXTERNALSECURE: "false"
      ZITADEL_EXTERNALDOMAIN: ${ZITADEL_EXTERNAL_DOMAIN:-localhost}
      ZITADEL_EXTERNALPORT: ${ZITADEL_PORT:-8180}
      ZITADEL_PORT: 8080
      ZITADEL_TLS_ENABLED: "false"
      ZITADEL_DATABASE_POSTGRES_HOST: postgres
      ZITADEL_DATABASE_POSTGRES_PORT: 5432
      ZITADEL_DATABASE_POSTGRES_DATABASE: zitadel
      ZITADEL_DATABASE_POSTGRES_USER_USERNAME: ${POSTGRES_USER}
      ZITADEL_DATABASE_POSTGRES_USER_PASSWORD: ${POSTGRES_PASSWORD}
      ZITADEL_DATABASE_POSTGRES_USER_SSL_MODE: disable
      ZITADEL_DATABASE_POSTGRES_ADMIN_USERNAME: ${POSTGRES_USER}
      ZITADEL_DATABASE_POSTGRES_ADMIN_PASSWORD: ${POSTGRES_PASSWORD}
      ZITADEL_DATABASE_POSTGRES_ADMIN_SSL_MODE: disable
      ZITADEL_FIRSTINSTANCE_ORG_HUMAN_USERNAME: admin@foodeapp.localhost
      ZITADEL_FIRSTINSTANCE_ORG_HUMAN_PASSWORD: Admin@FoodeApp1!
      ZITADEL_FIRSTINSTANCE_ORG_HUMAN_PASSWORDCHANGEREQUIRED: "false"
      ZITADEL_FIRSTINSTANCE_ORG_NAME: FoodeApp
      ZITADEL_FIRSTINSTANCE_ORG_HUMAN_EMAIL_ADDRESS: admin@foodeapp.localhost
      ZITADEL_FIRSTINSTANCE_ORG_HUMAN_EMAIL_VERIFIED: "true"
    depends_on:
      zitadel-init-db:
        condition: service_completed_successfully
    ports:
      - "${ZITADEL_PORT:-8180}:8080"
    healthcheck:
      test: ["CMD", "/app/zitadel", "ready", "--config", "/dev/null"]
      interval: 10s
      timeout: 5s
      retries: 20
      start_period: 30s

  # ── Observabilidade local (ADR-018) ────────────────────────────────────────
  # Para modo DEV LOCAL: svc-users roda nativo via dotnet run/watch (não container)
  # Para modo PROD: docker-compose.yml.prod com svc-users containerizado

  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.119.0
    container_name: foodeapp-otel-collector
    command: ["--config=/etc/otel/otel-collector.yaml"]
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ./infra/local/otel-collector.yaml:/etc/otel/otel-collector.yaml:ro
    ports:
      - "${OTEL_GRPC_PORT:-4317}:4317"    # OTLP gRPC
      - "${OTEL_HTTP_PORT:-4318}:4318"    # OTLP HTTP
      - "8889:8889"                       # Prometheus exporter (o Prometheus faz scraping aqui)
      - "13133:13133"                     # Health check do collector
    depends_on:
      - tempo
      - loki

  prometheus:
    image: prom/prometheus:v3.1.0
    container_name: foodeapp-prometheus
    user: "0:0"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    command:
      - "--config.file=/etc/prometheus/prometheus.yaml"
      - "--storage.tsdb.path=/data"
      - "--storage.tsdb.retention.time=24h"
      - "--web.enable-lifecycle"
      - "--web.enable-remote-write-receiver"   # Recebe métricas do Tempo metrics_generator
      - "--enable-feature=exemplar-storage"    # Armazena exemplars (links trace → métrica)
    volumes:
      - ./infra/local/prometheus.yaml:/etc/prometheus/prometheus.yaml:ro
      - prometheus_data:/data
    ports:
      - "${PROMETHEUS_PORT:-9090}:9090"
    depends_on:
      - otel-collector

  tempo:
    image: grafana/tempo:2.7.1
    container_name: foodeapp-tempo
    user: "0:0"
    command: ["-config.file=/etc/tempo/tempo.yaml"]
    volumes:
      - ./infra/local/tempo.yaml:/etc/tempo/tempo.yaml:ro
      - tempo_data:/tmp/tempo
    ports:
      - "${TEMPO_PORT:-3200}:3200"    # Tempo HTTP (Grafana consulta aqui)

  loki:
    image: grafana/loki:2.9.7
    container_name: foodeapp-loki
    user: "0:0"
    command: ["-config.file=/etc/loki/local-config.yaml"]
    volumes:
      - ./infra/local/loki-config.yaml:/etc/loki/local-config.yaml:ro
      - loki_data:/tmp/loki
    ports:
      - "${LOKI_PORT:-3100}:3100"

  promtail:
    image: grafana/promtail:3.0.0
    container_name: foodeapp-promtail
    command: ["-config.file=/etc/promtail/config.yaml"]
    volumes:
      - ./infra/local/promtail-config.yaml:/etc/promtail/config.yaml:ro
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
      - /var/run/docker.sock:/var/run/docker.sock
    depends_on:
      - loki

  grafana:
    image: grafana/grafana:11.4.0
    container_name: foodeapp-grafana
    environment:
      GF_users_ANONYMOUS_ENABLED: "true"
      GF_users_ANONYMOUS_ORG_ROLE: Admin
      GF_users_DISABLE_LOGIN_FORM: "true"
    volumes:
      - ./infra/local/grafana-datasources.yaml:/etc/grafana/provisioning/datasources/datasources.yaml:ro
      - ./infra/local/grafana-dashboards.yaml:/etc/grafana/provisioning/dashboards/dashboards.yaml:ro
      - ./infra/local/dashboards:/var/lib/grafana/dashboards:ro
      - grafana_data:/var/lib/grafana
    ports:
      - "${GRAFANA_PORT:-3000}:3000"
    depends_on:
      - prometheus
      - tempo
      - loki

volumes:
  foodeapp_postgres_users_data:
  prometheus_data:
  tempo_data:
  loki_data:
  grafana_data:
