################################################################################
# Kong Plugins globais — Rate Limiting + Correlação de Requests
# Aplicar com: kubectl apply -f infra/k8s/base/kong/plugins.yaml
################################################################################

---
# Rate Limiting global (aplica em todas as rotas por padrão)
apiVersion: configuration.konghq.com/v1
kind: KongPlugin
metadata:
  name: rate-limiting-global
  namespace: foodeapp-system
  annotations:
    kubernetes.io/ingress.class: "kong"
config:
  minute: 100           # 100 req/min por IP
  hour: 1000
  policy: local
  fault_tolerant: true
  hide_client_headers: false
plugin: rate-limiting

---
# Correlação de requests — injeta X-Correlation-Id
apiVersion: configuration.konghq.com/v1
kind: KongPlugin
metadata:
  name: correlation-id
  namespace: foodeapp-system
config:
  header_name: X-Correlation-Id
  generator: uuid#counter
  echo_downstream: true
plugin: correlation-id

---
# CORS global
apiVersion: configuration.konghq.com/v1
kind: KongPlugin
metadata:
  name: cors-global
  namespace: foodeapp-system
config:
  origins:
    - "https://foodeapp.com.br"
    - "https://staging.foodeapp.com.br"
    - "http://localhost:3000"
    - "http://localhost:8081"
  methods:
    - GET
    - POST
    - PUT
    - DELETE
    - PATCH
    - OPTIONS
  headers:
    - usersorization
    - Content-Type
    - X-Correlation-Id
    - X-Request-Id
  credentials: true
  max_age: 3600
plugin: cors

---
# KongClusterPlugin — JWT validated globalmente pelo Keycloak JWKS
apiVersion: configuration.konghq.com/v1
kind: KongClusterPlugin
metadata:
  name: jwt-validation
  annotations:
    kubernetes.io/ingress.class: "kong"
config:
  # Kong valida JWT localmente usando JWKS endpoint do Keycloak
  # Não chama Keycloak a cada request
  uri_param_names:
    - jwt
  cookie_names: []
  key_claim_name: kid
  claims_to_verify:
    - exp
plugin: jwt
