################################################################################
# Keycloak Helm Values (Bitnami)
# helm repo add bitnami https://charts.bitnami.com/bitnami
# helm install keycloak bitnami/keycloak -n foodeapp-system -f infra/k8s/base/keycloak/values.yaml
################################################################################

users:
  adminUser: admin
  # adminPassword: configurado via Secret (veja keycloak-secret.yaml)
  existingSecret: keycloak-admin-secret
  existingSecretPasswordKey: admin-password

# PostgreSQL externo (usa o PostgreSQL Flexible Server do Azure)
postgresql:
  enabled: false

externalDatabase:
  host: ""         # Preencher com FQDN do PostgreSQL (output do Terraform)
  port: 5432
  database: foodeapp_users
  user: pgadmin
  # password via secret:
  existingSecret: keycloak-db-secret
  existingSecretPasswordKey: db-password

# Réplicas
replicaCount: 2

# Resources
resources:
  requests:
    cpu: 500m
    memory: 768Mi
  limits:
    cpu: 1500m
    memory: 1536Mi

# Service
service:
  type: ClusterIP   # Acesso interno — Kong é quem expõe externamente

# Probes
startupProbe:
  enabled: true
  initialDelaySeconds: 30
  periodSeconds: 10
  failureThreshold: 30  # Keycloak pode demorar para inicializar

livenessProbe:
  enabled: true
  initialDelaySeconds: 60
  periodSeconds: 10

readinessProbe:
  enabled: true
  initialDelaySeconds: 30
  periodSeconds: 10

# Configurações do Keycloak
extraEnvVars:
  - name: KC_PROXY
    value: "edge"             # Keycloak atrás de proxy/load balancer
  - name: KC_HOSTNAME_STRICT
    value: "false"
  - name: JAVA_OPTS_APPEND
    value: "-Djgroups.dns.query=keycloak-headless.foodeapp-system.svc.cluster.local"

# Cache distribuído
cache:
  enabled: true
  stackFile: "default-configs/cache-ispn.xml"  # ISPN para JGroups clustering

# Ingress via Kong — declarado no overlay (host específico por env)
ingress:
  enabled: false

# ─── Node Pool Affinity (infra pool) ─────────────────────────────────────────────
nodeSelector:
  role: infra

tolerations:
  - key: workload
    operator: Equal
    value: infra
    effect: NoSchedule

