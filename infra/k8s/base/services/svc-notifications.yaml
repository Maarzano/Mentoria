################################################################################
# svc-notifications — Notificações e Hub em Tempo Real
# Schema DB: foodeapp_notifications | Porta: 8080 (HTTP) + 8081 (SignalR/WS)
# Responsabilidade: Push/Email/WhatsApp + hub SignalR/WebSocket
# Conexões: PostgreSQL + Redis (backplane SignalR) + RabbitMQ (consumer)
# Nota: Redis backplane é obrigatório para SignalR com múltiplas réplicas
################################################################################

---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: svc-notifications
  labels:
    app: svc-notifications
    azure.workload.identity/use: "true"

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: svc-notifications
  labels:
    app: svc-notifications
    role: service
spec:
  replicas: 1
  selector:
    matchLabels:
      app: svc-notifications
  template:
    metadata:
      labels:
        app: svc-notifications
        role: service
        version: v1
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8080"
        prometheus.io/path: "/metrics"
    spec:
      serviceAccountName: svc-notifications
      # terminationGracePeriodSeconds maior para não cortar WebSocket connections ativas
      terminationGracePeriodSeconds: 60
      containers:
        - name: svc-notifications
          image: svc-notifications:latest
          imagePullPolicy: Always
          ports:
            - name: http
              containerPort: 8080
            - name: signalr
              containerPort: 8081
          envFrom:
            - configMapRef:
                name: foodeapp-env-config
          env:
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: foodeapp-common-secrets
                  key: postgres-admin-password
            - name: REDIS_KEY
              valueFrom:
                secretKeyRef:
                  name: foodeapp-common-secrets
                  key: redis-primary-key
            - name: RABBITMQ_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: foodeapp-common-secrets
                  key: rabbitmq-password
            - name: ConnectionStrings__Default
              value: "Host=$(POSTGRES_HOST);Database=foodeapp_notifications;Username=pgadmin;Password=$(POSTGRES_PASSWORD);SslMode=Require"
            # Redis backplane para SignalR — garante roteamento de mensagens entre réplicas
            - name: ConnectionStrings__Redis
              value: "$(REDIS_HOST):6380,password=$(REDIS_KEY),ssl=True,abortConnect=False"
          resources:
            requests:
              cpu: 200m
              memory: 512Mi
            limits:
              cpu: 1000m
              memory: 1Gi
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8080
            initialDelaySeconds: 30
            periodSeconds: 15            # intervalo maior — WebSocket connections longas
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /ready
              port: 8080
            initialDelaySeconds: 15
            periodSeconds: 10
            failureThreshold: 3
          volumeMounts:
            - name: secrets-store
              mountPath: "/mnt/secrets-store"
              readOnly: true
      volumes:
        - name: secrets-store
          csi:
            driver: secrets-store.csi.k8s.io
            readOnly: true
            volumeAttributes:
              secretProviderClass: "foodeapp-common-secrets"

---
apiVersion: v1
kind: Service
metadata:
  name: svc-notifications
  labels:
    app: svc-notifications
spec:
  selector:
    app: svc-notifications
  ports:
    - name: http
      port: 80
      targetPort: 8080
    - name: signalr
      port: 8081
      targetPort: 8081
  type: ClusterIP

---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: svc-notifications
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: svc-notifications
  minReplicas: 1
  maxReplicas: 10
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 80
