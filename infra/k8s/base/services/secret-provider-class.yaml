################################################################################
# SecretProviderClass — integração AKS ↔ Azure Key Vault via CSI driver
#
# Valores que precisam ser preenchidos via patch no overlay de cada ambiente:
#   KEYVAULT_NAME_PLACEHOLDER         → terraform output -chdir=envs/<env> key_vault_name
#   WORKLOAD_IDENTITY_CLIENT_ID       → terraform output -chdir=envs/<env> aks_kubelet_identity_object_id
#   TENANT_ID_PLACEHOLDER             → az account show --query tenantId -o tsv
#
# Os patches estão em k8s/overlays/staging/kustomization.yaml e .../production/
################################################################################

---
# foodeapp-common-secrets: postgres, redis, rabbitmq — montado por todos os serviços
apiVersion: secrets-store.csi.x-k8s.io/v1
kind: SecretProviderClass
metadata:
  name: foodeapp-common-secrets
spec:
  provider: azure
  parameters:
    usePodIdentity: "false"
    useVMManagedIdentity: "false"
    clientID: "WORKLOAD_IDENTITY_CLIENT_ID"
    keyvaultName: "KEYVAULT_NAME_PLACEHOLDER"
    tenantId: "TENANT_ID_PLACEHOLDER"
    objects: |
      array:
        - |
          objectName: postgres-admin-password
          objectType: secret
        - |
          objectName: redis-primary-key
          objectType: secret
        - |
          objectName: rabbitmq-password
          objectType: secret
  secretObjects:
    - secretName: foodeapp-common-secrets
      type: Opaque
      data:
        - key: postgres-admin-password
          objectName: postgres-admin-password
        - key: redis-primary-key
          objectName: redis-primary-key
        - key: rabbitmq-password
          objectName: rabbitmq-password

---
# svc-payments-secrets: mercadopago + postgres + rabbitmq
apiVersion: secrets-store.csi.x-k8s.io/v1
kind: SecretProviderClass
metadata:
  name: svc-payments-secrets
spec:
  provider: azure
  parameters:
    usePodIdentity: "false"
    useVMManagedIdentity: "false"
    clientID: "WORKLOAD_IDENTITY_CLIENT_ID"
    keyvaultName: "KEYVAULT_NAME_PLACEHOLDER"
    tenantId: "TENANT_ID_PLACEHOLDER"
    objects: |
      array:
        - |
          objectName: mercadopago-access-token
          objectType: secret
        - |
          objectName: postgres-admin-password
          objectType: secret
        - |
          objectName: rabbitmq-password
          objectType: secret
  secretObjects:
    - secretName: svc-payments-secrets
      type: Opaque
      data:
        - key: mercadopago-access-token
          objectName: mercadopago-access-token
        - key: postgres-admin-password
          objectName: postgres-admin-password
        - key: rabbitmq-password
          objectName: rabbitmq-password
