################################################################################
# svc-auth — Auth & Perfis de Usuário
# Schema DB: foodeapp_auth | Porta: 8080
# Responsabilidade: perfis de aplicação pós-Keycloak, favoritos
################################################################################

---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: svc-auth
  labels:
    app: svc-auth
    azure.workload.identity/use: "true"

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: svc-auth
  labels:
    app: svc-auth
    role: service
spec:
  replicas: 1
  selector:
    matchLabels:
      app: svc-auth
  template:
    metadata:
      labels:
        app: svc-auth
        role: service
        version: v1
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8080"
        prometheus.io/path: "/metrics"
    spec:
      serviceAccountName: svc-auth
      containers:
        - name: svc-auth
          image: svc-auth:latest              # registry substituído pelo overlay via images:
          imagePullPolicy: Always
          ports:
            - name: http
              containerPort: 8080
          envFrom:
            - configMapRef:
                name: foodeapp-env-config     # injetado pelo overlay (staging/production)
          env:
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: foodeapp-common-secrets
                  key: postgres-admin-password
            - name: RABBITMQ_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: foodeapp-common-secrets
                  key: rabbitmq-password
            - name: ConnectionStrings__Default
              value: "Host=$(POSTGRES_HOST);Database=foodeapp_auth;Username=pgadmin;Password=$(POSTGRES_PASSWORD);SslMode=Require"
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8080
            initialDelaySeconds: 30
            periodSeconds: 10
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /ready
              port: 8080
            initialDelaySeconds: 15
            periodSeconds: 5
            failureThreshold: 3
          volumeMounts:
            - name: secrets-store
              mountPath: "/mnt/secrets-store"
              readOnly: true
      volumes:
        - name: secrets-store
          csi:
            driver: secrets-store.csi.k8s.io
            readOnly: true
            volumeAttributes:
              secretProviderClass: "foodeapp-common-secrets"

---
apiVersion: v1
kind: Service
metadata:
  name: svc-auth
  labels:
    app: svc-auth
spec:
  selector:
    app: svc-auth
  ports:
    - name: http
      port: 80
      targetPort: 8080
  type: ClusterIP

---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: svc-auth
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: svc-auth
  minReplicas: 1
  maxReplicas: 5
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 80
