################################################################################
# svc-users — users & Perfis de Usuário
# Schema DB: foodeapp_users | Porta: 8080
# Responsabilidade: perfis de aplicação pós-Keycloak, favoritos
################################################################################

---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: svc-users
  labels:
    app: svc-users
    azure.workload.identity/use: "true"

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: svc-users
  labels:
    app: svc-users
    role: service
spec:
  replicas: 1
  selector:
    matchLabels:
      app: svc-users
  template:
    metadata:
      labels:
        app: svc-users
        role: service
        version: v1
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8080"
        prometheus.io/path: "/metrics"
    spec:
      serviceAccountName: svc-users
      containers:
        - name: svc-users
          image: svc-users:latest              # registry substituído pelo overlay via images:
          imagePullPolicy: Always
          ports:
            - name: http
              containerPort: 8080
          envFrom:
            - configMapRef:
                name: foodeapp-env-config     # injetado pelo overlay (staging/production)
          env:
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: foodeapp-common-secrets
                  key: postgres-admin-password
            - name: RABBITMQ_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: foodeapp-common-secrets
                  key: rabbitmq-password
            - name: Database__Host
              value: "$(POSTGRES_HOST)"
            - name: Database__Port
              value: "$(POSTGRES_PORT)"
            - name: Database__Database
              value: "foodeapp_users"
            - name: Database__Username
              value: "$(POSTGRES_USER)"
            - name: Database__Password
              value: "$(POSTGRES_PASSWORD)"
            # ADR-018: OTel Collector no cluster (namespace monitoring)
            - name: OTEL_EXPORTER_OTLP_ENDPOINT
              value: "http://opentelemetry-collector.monitoring:4318"
            - name: OTEL_EXPORTER_OTLP_PROTOCOL
              value: "http/protobuf"
            - name: OTEL_SERVICE_NAME
              value: "svc-users"
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8080
            initialDelaySeconds: 30
            periodSeconds: 10
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /ready
              port: 8080
            initialDelaySeconds: 15
            periodSeconds: 5
            failureThreshold: 3
          volumeMounts:
            - name: secrets-store
              mountPath: "/mnt/secrets-store"
              readOnly: true
      volumes:
        - name: secrets-store
          csi:
            driver: secrets-store.csi.k8s.io
            readOnly: true
            volumeAttributes:
              secretProviderClass: "foodeapp-common-secrets"

---
apiVersion: v1
kind: Service
metadata:
  name: svc-users
  labels:
    app: svc-users
spec:
  selector:
    app: svc-users
  ports:
    - name: http
      port: 80
      targetPort: 8080
  type: ClusterIP

---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: svc-users
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: svc-users
  minReplicas: 1
  maxReplicas: 5
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 80
