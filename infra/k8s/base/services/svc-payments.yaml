################################################################################
# svc-payments — Pagamentos
# Schema DB: foodeapp_payments | Porta: 8080
# Responsabilidade: pagamentos via Mercado Pago, estornos, integração SAGA
# Conexões: PostgreSQL + RabbitMQ (SAGA) + Mercado Pago API (egress)
# Segurança: NUNCA armazena dados de cartão — apenas tokens gerados pelo MP SDK
################################################################################

---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: svc-payments
  labels:
    app: svc-payments
    azure.workload.identity/use: "true"

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: svc-payments
  labels:
    app: svc-payments
    role: service
spec:
  replicas: 1
  selector:
    matchLabels:
      app: svc-payments
  template:
    metadata:
      labels:
        app: svc-payments
        role: service
        version: v1
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8080"
        prometheus.io/path: "/metrics"
    spec:
      serviceAccountName: svc-payments
      containers:
        - name: svc-payments
          image: svc-payments:latest
          imagePullPolicy: Always
          ports:
            - name: http
              containerPort: 8080
          envFrom:
            - configMapRef:
                name: foodeapp-env-config
          env:
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: svc-payments-secrets    # SecretProviderClass dedicado
                  key: postgres-admin-password
            - name: RABBITMQ_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: svc-payments-secrets
                  key: rabbitmq-password
            - name: MERCADOPAGO_ACCESS_TOKEN
              valueFrom:
                secretKeyRef:
                  name: svc-payments-secrets
                  key: mercadopago-access-token
            - name: ConnectionStrings__Default
              value: "Host=$(POSTGRES_HOST);Database=foodeapp_payments;Username=pgadmin;Password=$(POSTGRES_PASSWORD);SslMode=Require"
            # Timeout do gateway de pagamento — se não responder em 10s, vai para AGUARDANDO_CONFIRMACAO
            - name: MercadoPago__TimeoutSeconds
              value: "10"
          resources:
            requests:
              cpu: 200m
              memory: 512Mi
            limits:
              cpu: 500m
              memory: 1Gi
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8080
            initialDelaySeconds: 30
            periodSeconds: 10
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /ready
              port: 8080
            initialDelaySeconds: 15
            periodSeconds: 5
            failureThreshold: 3
          volumeMounts:
            - name: secrets-store
              mountPath: "/mnt/secrets-store"
              readOnly: true
      volumes:
        - name: secrets-store
          csi:
            driver: secrets-store.csi.k8s.io
            readOnly: true
            volumeAttributes:
              secretProviderClass: "svc-payments-secrets"  # SecretProviderClass dedicado com MP token

---
apiVersion: v1
kind: Service
metadata:
  name: svc-payments
  labels:
    app: svc-payments
spec:
  selector:
    app: svc-payments
  ports:
    - name: http
      port: 80
      targetPort: 8080
  type: ClusterIP

---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: svc-payments
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: svc-payments
  minReplicas: 1
  maxReplicas: 10
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 80
