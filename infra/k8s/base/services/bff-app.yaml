################################################################################
# bff-app — Backend for Frontend do App do Consumidor (React Native)
# Schema DB: nenhum — apenas agrega chamadas aos microserviços
# Responsabilidade: busca, fluxo de pedido, status, histórico, localização
# Nota: payloads menores que bff-web (otimizado para mobile/conexão instável)
################################################################################

---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: bff-app
  labels:
    app: bff-app
    azure.workload.identity/use: "true"

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: bff-app
  labels:
    app: bff-app
    role: bff                           # role=bff → usersorizationPolicy permite Kong chamar
spec:
  replicas: 1
  selector:
    matchLabels:
      app: bff-app
  template:
    metadata:
      labels:
        app: bff-app
        role: bff
        version: v1
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8080"
        prometheus.io/path: "/metrics"
    spec:
      serviceAccountName: bff-app
      containers:
        - name: bff-app
          image: bff-app:latest
          imagePullPolicy: Always
          ports:
            - name: http
              containerPort: 8080
          envFrom:
            - configMapRef:
                name: foodeapp-env-config
          env:
            - name: Services__users
              value: "http://svc-users.$(NAMESPACE).svc.cluster.local"
            - name: Services__Establishments
              value: "http://svc-establishments.$(NAMESPACE).svc.cluster.local"
            - name: Services__Catalog
              value: "http://svc-catalog.$(NAMESPACE).svc.cluster.local"
            - name: Services__Events
              value: "http://svc-events.$(NAMESPACE).svc.cluster.local"
            - name: Services__Location
              value: "http://svc-location.$(NAMESPACE).svc.cluster.local"
            - name: Services__Orders
              value: "http://svc-orders.$(NAMESPACE).svc.cluster.local"
            - name: Services__Notifications
              value: "http://svc-notifications.$(NAMESPACE).svc.cluster.local"
            - name: NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
          resources:
            requests:
              cpu: 200m
              memory: 256Mi
            limits:
              cpu: 1000m
              memory: 512Mi
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8080
            initialDelaySeconds: 20
            periodSeconds: 10
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /ready
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 5
            failureThreshold: 3

---
apiVersion: v1
kind: Service
metadata:
  name: bff-app
  labels:
    app: bff-app
spec:
  selector:
    app: bff-app
  ports:
    - name: http
      port: 80
      targetPort: 8080
  type: ClusterIP

---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: bff-app
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: bff-app
  minReplicas: 1
  maxReplicas: 12             # app mobile tende a ter mais usuários simultâneos
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 80
