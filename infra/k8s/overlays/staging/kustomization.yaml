################################################################################
# OVERLAY: staging
# Kustomization que aplica patches sobre o base para o ambiente de staging
# kubectl apply -k infra/k8s/overlays/staging/
#
# Após qualquer terraform apply em envs/staging, atualizar:
#   POSTGRES_HOST  → terraform output postgres_fqdn
#   REDIS_HOST     → terraform output redis_hostname
#   KV name patch  → terraform output key_vault_name
#   Images newName → login ACR: az acr show --name acrfoodeappstaging --query loginServer
################################################################################

apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: foodeapp-staging

resources:
  - ../../base/services          # todos os microserviços + BFFs
  - ../../base/namespaces/namespaces.yaml
  - ../../base/istio/peer-authentication.yaml
  - ../../base/istio/authorization-policies.yaml

# Subst de registry: base usa "svc-auth:latest", overlay define o registry completo
# CI/CD deve rodar: kustomize edit set image svc-auth=<acr>.azurecr.io/svc-auth:<sha>
images:
  - name: svc-auth
    newName: acrfoodeappstaging.azurecr.io/svc-auth
    newTag: latest
  - name: svc-establishments
    newName: acrfoodeappstaging.azurecr.io/svc-establishments
    newTag: latest
  - name: svc-catalog
    newName: acrfoodeappstaging.azurecr.io/svc-catalog
    newTag: latest
  - name: svc-events
    newName: acrfoodeappstaging.azurecr.io/svc-events
    newTag: latest
  - name: svc-location
    newName: acrfoodeappstaging.azurecr.io/svc-location
    newTag: latest
  - name: svc-orders
    newName: acrfoodeappstaging.azurecr.io/svc-orders
    newTag: latest
  - name: svc-notifications
    newName: acrfoodeappstaging.azurecr.io/svc-notifications
    newTag: latest
  - name: svc-payments
    newName: acrfoodeappstaging.azurecr.io/svc-payments
    newTag: latest
  - name: bff-web
    newName: acrfoodeappstaging.azurecr.io/bff-web
    newTag: latest
  - name: bff-app
    newName: acrfoodeappstaging.azurecr.io/bff-app
    newTag: latest

patches:
  # Staging usa 1 réplica para economizar custo
  - patch: |-
      - op: replace
        path: /spec/replicas
        value: 1
    target:
      kind: Deployment
      labelSelector: "environment=staging"

  # Patch no Key Vault name dos SecretProviderClasses
  # Valor: terraform output -chdir=infra/terraform/envs/staging key_vault_name
  - patch: |-
      - op: replace
        path: /spec/parameters/keyvaultName
        value: kv-foodeapp-stg
      - op: replace
        path: /spec/parameters/tenantId
        value: REPLACE_WITH_AZURE_TENANT_ID
      - op: replace
        path: /spec/parameters/clientID
        value: REPLACE_WITH_WORKLOAD_IDENTITY_CLIENT_ID
    target:
      kind: SecretProviderClass

# ConfigMap com valores específicos de staging
configMapGenerator:
  - name: foodeapp-env-config
    literals:
      - ENVIRONMENT=staging
      - LOG_LEVEL=Debug
      - OTEL_TRACES_SAMPLER_ARG=1.0
      # Preencher após terraform apply:
      #   terraform output -chdir=infra/terraform/envs/staging postgres_fqdn
      - POSTGRES_HOST=REPLACE_WITH_POSTGRES_FQDN
      - POSTGRES_PORT=5432
      - POSTGRES_USER=pgadmin
      # terraform output -chdir=infra/terraform/envs/staging redis_hostname
      - REDIS_HOST=REPLACE_WITH_REDIS_HOST
      - RABBITMQ_HOST=rabbitmq.foodeapp-system.svc.cluster.local
      - KEYCLOAK_REALM_URL=https://auth-staging.foodeapp.com.br/realms/foodeapp
      - OTEL_EXPORTER_OTLP_ENDPOINT=http://opentelemetry-collector.monitoring.svc.cluster.local:4317
      - OTEL_SERVICE_NAMESPACE=foodeapp-staging

commonLabels:
  environment: staging
  project: foodeapp
