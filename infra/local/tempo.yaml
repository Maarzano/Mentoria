################################################################################
# Grafana Tempo — Configuração LOCAL (dev)
# ADR-018: Tempo armazena distributed traces
#
# metrics_generator: Gera métricas a partir dos traces para:
#   - Service Graph (grafo de dependências no Grafana)
#   - Span Metrics (RED metrics derivadas dos traces)
################################################################################

server:
  http_listen_port: 3200

distributor:
  receivers:
    otlp:
      protocols:
        grpc:
          endpoint: 0.0.0.0:4317   # recebe do OTel Collector

ingester:
  trace_idle_period: 10s
  max_block_bytes: 1_000_000
  max_block_duration: 5m

metrics_generator:
  registry:
    external_labels:
      source: tempo
      cluster: local-dev
  storage:
    path: /tmp/tempo/generator/wal
    remote_write:
      - url: http://prometheus:9090/api/v1/write
  processor:
    service_graphs:
      dimensions:
        - service.name
      enable_client_server_prefix: true
    span_metrics:
      dimensions:
        - service.name
        - http.method
        - http.route
        - http.status_code
        - db.system
        - db.statement

overrides:
  defaults:
    metrics_generator:
      processors:
        - service-graphs
        - span-metrics

compactor:
  compaction:
    compaction_window: 1h
    max_compaction_objects: 1000000
    block_retention: 24h
    compacted_block_retention: 1h

storage:
  trace:
    backend: local
    local:
      path: /tmp/tempo/blocks
    wal:
      path: /tmp/tempo/wal

querier:
  frontend_worker:
    frontend_address: localhost:9095
