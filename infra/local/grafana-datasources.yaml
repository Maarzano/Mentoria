################################################################################
# Grafana — Datasources provisionados automaticamente (local dev)
# ADR-018: Grafana consolida métricas (Prometheus), traces (Tempo) e logs (Loki)
#
# Correlações configuradas:
#   Tempo → Prometheus: métricas derivadas dos traces (service graph, span metrics)
#   Tempo → Loki: logs correlacionados via traceId
#   Loki  → Tempo: link de traceId no log → trace completo
################################################################################

apiVersion: 1

datasources:
  - name: Prometheus
    type: prometheus
    uid: prometheus
    url: http://prometheus:9090
    isDefault: true
    editable: true
    jsonData:
      exemplarTraceIdDestinations:
        - name: traceID
          datasourceUid: tempo

  - name: Loki
    type: loki
    uid: loki
    url: http://loki:3100
    editable: true
    isDefault: false
    jsonData:
      derivedFields:
        - name: TraceId
          matcherRegex: '"TraceId":"(\w+)"'
          url: "$${__value.raw}"
          datasourceUid: tempo
          matcherType: regex
        - name: traceID
          matcherRegex: 'traceID=(\w+)'
          url: "$${__value.raw}"
          datasourceUid: tempo
          matcherType: regex

  - name: Tempo
    type: tempo
    uid: tempo
    url: http://tempo:3200
    editable: true
    jsonData:
      tracesToMetricsV2:
        datasourceUid: prometheus
        spanStartTimeShift: "-2m"
        spanEndTimeShift: "2m"
        tags:
          - key: service.name
            value: service
          - key: http.method
          - key: http.route
          - key: http.status_code
          - key: db.system
      tracesToLogsV2:
        datasourceUid: loki
        spanStartTimeShift: "-1m"
        spanEndTimeShift: "1m"
        filterByTraceID: true
        filterBySpanID: false
        tags:
          - key: service.name
            value: service
      serviceMap:
        datasourceUid: prometheus
      nodeGraph:
        enabled: true
      search:
        hide: false
      lokiSearch:
        datasourceUid: loki
